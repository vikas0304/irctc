<!doctype html>
<html>
  <head>
    <style>
      body {
        width: 280px;
        padding: 15px;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: #f8f9fa;
      }
      .status {
        font-size: 12px;
        font-weight: 600;
        color: #495057;
        margin-bottom: 10px;
      }
      .card {
        background: white;
        padding: 10px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        margin-bottom: 10px;
      }
      .detail {
        font-size: 12px;
        color: #444;
        margin: 4px 0;
      }
      button {
        width: 100%;
        padding: 10px;
        background: #fb792b;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        margin-top: 5px;
      }
      button:hover {
        background: #e66a1f;
      }
      button.secondary {
        background: #6c757d;
        margin-top: 8px;
      }
      button.secondary:hover {
        background: #5a6268;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div id="status" class="status">Status: Idle</div>
    <div class="card">
      <div class="detail"><b>Search:</b> LTT -&gt; PRYJ</div>
      <div class="detail"><b>Date:</b> 30/05/2026</div>
      <div class="detail"><b>Class:</b> Sleeper (SL)</div>
      <div class="detail"><b>Quota:</b> General</div>
    </div>
    <div class="card">
      <div class="detail"><b>Train:</b> MAHANAGARI EXP (22177)</div>
      <div class="detail"><b>Class:</b> AC 2 Tier (2A)</div>
    </div>
    <div class="card">
      <div class="detail"><b>User:</b> anilpal707</div>
      <div class="detail"><b>Pass:</b> Apovey@6472</div>
    </div>
    <div class="card">
      <div class="detail"><b>Passenger 1:</b> Vikas Pal</div>
      <div class="detail"><b>Age:</b> 22</div>
      <div class="detail"><b>Gender:</b> M</div>
      <div class="detail"><b>Berth:</b> LB</div>
    </div>
    <div class="card">
      <div class="detail"><b>Passenger 2:</b> Shivshankar Pal</div>
      <div class="detail"><b>Age:</b> 48</div>
      <div class="detail"><b>Gender:</b> M</div>
      <div class="detail"><b>Berth:</b> LB</div>
    </div>

    <button id="runBtn">Arm Automation</button>
    <button id="stopBtn" class="secondary">Stop Automation</button>
    <script src="popup.js"></script>
  </body>
</html>
